name: Bug Report
description: File a bug report for an agent, prompt, skill, or hook
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to fill this out!"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: "1. Run /speckit.specify\n2. See error..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Affected component
      placeholder: "e.g. speckit.specify.agent.md, install.sh"
